# docker-compose.vps.yml
# ─────────────────────────────────────────────────────────────────────────────
# Digunakan untuk deployment LANGSUNG di VPS tanpa CI/CD pipeline.
# Build image dari source code yang sudah di-pull dari GitHub.
#
# Cara pakai:
#   cp .env.production.example .env.production   # isi nilai yang benar
#   docker compose -f infra/docker/docker-compose.vps.yml up -d --build
#
# Untuk update setelah git pull:
#   docker compose -f infra/docker/docker-compose.vps.yml up -d --build api
#   docker compose -f infra/docker/docker-compose.vps.yml up -d --build web
#   docker compose -f infra/docker/docker-compose.vps.yml restart nginx
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── NGINX (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: beritakarya_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/beritakarya:/etc/ssl/beritakarya:ro
      - uploads_data:/app/uploads:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── BACKEND API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: beritakarya_api
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - ../../.env.production
    expose:
      - "3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── DATABASE ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: beritakarya_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-beritakarya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ganti_password_ini}
      POSTGRES_DB:       ${POSTGRES_DB:-beritakarya_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beritakarya}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
  nginx_logs:

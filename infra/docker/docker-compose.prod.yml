version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: beritakarya_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/beritakarya:/etc/ssl/beritakarya:ro

      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ${IMAGE_WEB}
    container_name: beritakarya_web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.beritakarya.co
    env_file:
      - ../../.env.production
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    image: ${IMAGE_API}
    container_name: beritakarya_api
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - ../../.env.production
    expose:
      - "3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: beritakarya_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5



volumes:
  postgres_data:
  uploads_data:
  nginx_logs:

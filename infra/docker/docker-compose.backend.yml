services:
  # ── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: beritakarya_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beritakarya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ganti_password_ini}
      POSTGRES_DB: ${POSTGRES_DB:-beritakarya}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"          # Internal Docker network saja, tidak ke publik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beritakarya} -d ${POSTGRES_DB:-beritakarya}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND API ───────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: beritakarya_api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=https://api.beritakarya.co
      - DATABASE_URL=postgresql://${POSTGRES_USER:-beritakarya}:${POSTGRES_PASSWORD:-ganti_password_ini}@postgres:5432/${POSTGRES_DB:-beritakarya}
      - DIRECT_URL=postgresql://${POSTGRES_USER:-beritakarya}:${POSTGRES_PASSWORD:-ganti_password_ini}@postgres:5432/${POSTGRES_DB:-beritakarya}
    env_file:
      - ../../.env.production
    expose:
      - "3001"          # Internal Docker network
    ports:
      - "127.0.0.1:3001:3001"  # Hanya localhost VPS — Nginx host bisa reach, internet tidak
    volumes:
      - /opt/beritakarya/uploads:/app/apps/api/uploads   # Bind mount langsung ke host
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  uploads_data:

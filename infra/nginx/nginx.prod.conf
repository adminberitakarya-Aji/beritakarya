user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # Gzip
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types      text/plain text/css application/json
                  application/javascript text/xml
                  application/xml image/svg+xml;

  # Rate limiting zones
  limit_req_zone  $binary_remote_addr zone=api:10m   rate=100r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;

  # ── Redirect HTTP → HTTPS ──────────────────────────────────
  server {
    listen 80;
    server_name *.beritakarya.co beritakarya.co;
    return 301 https://$host$request_uri;
  }

  # ── API Subdomain: api.beritakarya.co ──────────────────────
  server {
    listen 443 ssl http2;
    server_name api.beritakarya.co;

    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 15M;

    # CORS safety net
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.beritakarya\.co|beritakarya\.co|[^/]+\.beritakarya\.co|[^/]+\.vercel\.app)$") {
      set $cors_origin $http_origin;
    }

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin      $cors_origin always;
      add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
      add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With, Accept, X-Site-ID, x-site-id, X-API-Key, x-api-key" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Max-Age           86400 always;
      add_header Content-Length                   0;
      add_header Content-Type                     text/plain;
      return 204;
    }

    # ── Serve Media directly via Nginx (Optimized) ─────────
    location /api/v1/media/uploads/ {
      alias /app/uploads/;
      expires 30d;
      add_header Cache-Control "public, no-transform";
      add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Auth routes (rate limit ketat) ─────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass            http://api:3001;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
    }

    # ── Semua API routes lainnya ────────────────────────────
    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass            http://api:3001;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
    }
  }

  # Fallback untuk domain utama jika diakses lewat IP/VPS (opsional)
  server {
    listen 443 ssl http2;
    server_name www.beritakarya.co beritakarya.co;
    
    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;

    location / {
      return 301 https://api.beritakarya.co/health; # Atau redirect ke landing page Vercel
    }
  }
}

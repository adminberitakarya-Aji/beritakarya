user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # Gzip
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types      text/plain text/css application/json
                  application/javascript text/xml
                  application/xml image/svg+xml;

  # Rate limiting zones
  limit_req_zone  $binary_remote_addr zone=api:10m   rate=100r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;

  # ── Redirect HTTP → HTTPS ──────────────────────────────────
  server {
    listen 80;
    server_name *.beritakarya.com beritakarya.com;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name *.beritakarya.com beritakarya.com;

    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 15M;

    # ── API routes ─────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api:4000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Site-ID         $subdomain;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # ── Auth rate limit ────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:4000;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static uploads ─────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://api:4000;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Frontend ───────────────────────────────────────────
    location / {
      proxy_pass         http://web:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 30s;
    }

    # Extract subdomain for X-Site-ID header
    set $subdomain "";
    if ($host ~* "^([^.]+)\.beritakarya\.com$") {
      set $subdomain $1;
    }
  }
}

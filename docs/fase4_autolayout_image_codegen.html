    code:`import { Router, Request, Response } from 'express'
import multer from 'multer'
import path from 'path'
import fs from 'fs'
import { v4 as uuidv4 } from 'uuid'
import { requireAuth } from '../../middleware/auth.middleware'
import { asyncHandler } from '../../utils/asyncHandler'

export const mediaRouter = Router()

const UPLOAD_DIR = path.join(process.cwd(), 'uploads')
const THUMB_DIR  = path.join(process.cwd(), 'uploads', 'thumbs')
;[UPLOAD_DIR, THUMB_DIR].forEach(d => {
  if (!fs.existsSync(d)) fs.mkdirSync(d, { recursive: true })
})

const storage = multer.memoryStorage()

const upload = multer({
  storage,
  limits: { fileSize: 10 * 1024 * 1024 },
  fileFilter: (_, file, cb) => {
    const allowed = ['image/jpeg','image/png','image/webp','image/gif']
    if (allowed.includes(file.mimetype)) cb(null, true)
    else cb(new Error('Tipe file tidak didukung. Gunakan JPG, PNG, WebP, atau GIF'))
  }
})

async function processImage(buffer: Buffer, filename: string) {
  const sharp = (await import('sharp')).default
  const meta  = await sharp(buffer).metadata()

  const maxW = 1920
  const needResize = (meta.width ?? 0) > maxW

  // Full size → WebP
  const fullName = \`\${filename}.webp\`
  const fullPath = path.join(UPLOAD_DIR, fullName)
  await sharp(buffer)
    .resize(needResize ? maxW : undefined)
    .webp({ quality: 82 })
    .toFile(fullPath)

  // Thumbnail 400px → WebP
  const thumbName = \`\${filename}_thumb.webp\`
  const thumbPath = path.join(THUMB_DIR, thumbName)
  await sharp(buffer).resize(400).webp({ quality: 70 }).toFile(thumbPath)

  const finalMeta = await sharp(fullPath).metadata()
  return {
    fullName, thumbName,
    width: finalMeta.width ?? meta.width ?? 0,
    height: finalMeta.height ?? meta.height ?? 0,
    originalFormat: meta.format ?? 'unknown'
  }
}

mediaRouter.post(
  '/upload',
  requireAuth,
  upload.single('file'),
  asyncHandler(async (req: Request, res: Response) => {
    if (!req.file) {
      return res.status(400).json({
        success: false,
        error: { message: 'File tidak ditemukan' }
      })
    }

    const id = uuidv4()
    const processed = await processImage(req.file.buffer, id)

    const baseUrl  = process.env.API_URL || 'http://localhost:4000'
    const url      = \`\${baseUrl}/uploads/\${processed.fullName}\`
    const thumbUrl = \`\${baseUrl}/uploads/thumbs/\${processed.thumbName}\`

    res.status(201).json({
      success: true,
      data: {
        url,
        thumbUrl,
        width:          processed.width,
        height:         processed.height,
        originalFormat: processed.originalFormat,
        size:           req.file.size
      }
    })
  })
)

// Serve static files
const express = require('express')
mediaRouter.use('/uploads/thumbs', express.static(THUMB_DIR))
mediaRouter.use('/uploads',        express.static(UPLOAD_DIR))`

    code:`import { create } from 'zustand'
import { useEditorStore } from './editorStore'
import { api } from '../lib/api'
import type { Block } from '@beritakarya/types'

export interface LayoutSuggestion {
  type: 'split_paragraph' | 'insert_image_after' | 'add_heading' | 'reorder'
  targetBlockId: string
  reason: string
  data?: Record<string, any>
}

interface LayoutState {
  suggestions: LayoutSuggestion[]
  selected: Set<number>
  loading: boolean
  error: string | null
  summary: string

  analyze: (blocks: Block[]) => Promise<void>
  toggleSelect: (idx: number) => void
  selectAll: () => void
  clearAll: () => void
  applySelected: () => void
  dismiss: () => void
}

export const useLayoutStore = create<LayoutState>((set, get) => ({
  suggestions: [],
  selected: new Set(),
  loading: false,
  error: null,
  summary: '',

  analyze: async (blocks) => {
    set({ loading: true, error: null, suggestions: [], selected: new Set() })
    try {
      const { data } = await api.post('/ai/layout', { blocks })
      if (!data.success) throw new Error(data.error || 'Analisis gagal')
      set({
        suggestions: data.data.suggestions,
        summary: data.data.summary,
        selected: new Set(data.data.suggestions.map((_: any, i: number) => i)),
        loading: false
      })
    } catch (err: any) {
      set({
        error: err.response?.data?.error || err.message || 'AI tidak tersedia',
        loading: false
      })
    }
  },

  toggleSelect: (idx) => {
    set(s => {
      const next = new Set(s.selected)
      next.has(idx) ? next.delete(idx) : next.add(idx)
      return { selected: next }
    })
  },

  selectAll: () => {
    set(s => ({ selected: new Set(s.suggestions.map((_, i) => i)) }))
  },

  clearAll: () => set({ selected: new Set() }),

  applySelected: () => {
    const { suggestions, selected } = get()
    const editor = useEditorStore.getState()
    const toApply = suggestions.filter((_, i) => selected.has(i))

    let blocks = [...editor.blocks]

    toApply.forEach(s => {
      const idx = blocks.findIndex(b => b.id === s.targetBlockId)
      if (idx === -1) return

      if (s.type === 'split_paragraph') {
        const block = blocks[idx] as any
        const content: string = block.content || ''
        const sentences = content.match(/[^.!?]+[.!?]+/g) || [content]
        const splitAt = s.data?.splitAfterSentence || Math.ceil(sentences.length / 2)
        const part1 = sentences.slice(0, splitAt).join(' ').trim()
        const part2 = sentences.slice(splitAt).join(' ').trim()
        if (part1 && part2) {
          const { v4: uuidv4 } = require('uuid')
          blocks.splice(idx, 1,
            { ...block, content: part1 },
            { id: uuidv4(), type: 'paragraph', content: part2 }
          )
        }
      }
    })

    editor.setBlocks(blocks)
    set({ suggestions: [], selected: new Set(), summary: '' })
  },

  dismiss: () => set({ suggestions: [], selected: new Set(), error: null, summary: '' })
}))`
  },

      <button

      </button>

      {error && (

      {hasResult && (

          <div className="flex items-center justify-between">

          </div>

          <div className="space-y-2">
            {suggestions.map((s, i) => (

                key={i}

                  selected.has(i)
                    ? 'bg-orange-50 border-orange-300'
                    : 'bg-gray-50 border-gray-200 opacity-60'
                }\`}
              >
                <div className={\`mt-0.5 w-4 h-4 rounded flex items-center justify-center border shrink-0 \${
                  selected.has(i) ? 'bg-orange-500 border-orange-500' : 'border-gray-300'
                }\`}>
                  {selected.has(i) && <span className="text-white text-xs leading-none">✓</span>}
                </div>

                  <div className="flex items-center gap-1.5 mb-0.5">

                  </div>
                  <p className="text-xs text-gray-500 leading-relaxed">{s.reason}</p>
                </div>

            ))}

            <button

          Klik tombol di atas untuk menganalisis layout artikel

    desc:'Blok grid gambar: 2 atau 3 kolom, upload per slot, drag reorder gambar dalam grid, hapus per item',
    step:'Langkah 4: Tambahkan ke apps/web/components/editor/blocks/',
    code:`'use client'
import { useRef, useState } from 'react'
import { useEditorStore } from '../../../store/editorStore'
import { api } from '../../../lib/api'
import type { ImageGridBlock as TImageGridBlock, ImageItem } from '@beritakarya/types'

interface Props { block: TImageGridBlock }

export function ImageGridBlock({ block }: Props) {
  const { updateBlock } = useEditorStore()
  const [dragIdx, setDragIdx] = useState<number | null>(null)

  const setColumns = (columns: 2 | 3) => updateBlock(block.id, { columns })

  const uploadImage = async (file: File): Promise<ImageItem | null> => {
    const form = new FormData()
    form.append('file', file)
    try {
      const { data } = await api.post('/media/upload', form, {
        headers: { 'Content-Type': 'multipart/form-data' }
      })
      return { url: data.data.url, alt: file.name.replace(/\.[^/.]+$/, '') }
    } catch { return null }
  }

  const handleAddImage = async (file: File) => {
    const item = await uploadImage(file)
    if (!item) return
    updateBlock(block.id, { images: [...block.images, item] })
  }

  const handleRemove = (idx: number) => {
    updateBlock(block.id, {
      images: block.images.filter((_, i) => i !== idx)
    })
  }

  const handleCaptionChange = (idx: number, caption: string) => {
    const images = block.images.map((img, i) => i === idx ? { ...img, caption } : img)
    updateBlock(block.id, { images })
  }

  const handleDragStart = (idx: number) => setDragIdx(idx)

  const handleDrop = (targetIdx: number) => {
    if (dragIdx === null || dragIdx === targetIdx) return
    const imgs = [...block.images]
    const [moved] = imgs.splice(dragIdx, 1)
    imgs.splice(targetIdx, 0, moved)
    updateBlock(block.id, { images: imgs })
    setDragIdx(null)
  }

  const gridCols = block.columns === 2 ? 'grid-cols-2' : 'grid-cols-3'

  return (
    <div className="space-y-2">
      <div className="flex items-center gap-2">
        <span className="text-xs text-gray-500 font-medium">Grid Gambar</span>
        <div className="flex gap-1">
          {([2, 3] as const).map(c => (
            <button key={c} onClick={() => setColumns(c)}
              className={\`text-xs px-2 py-0.5 rounded border transition-colors \${
                block.columns === c
                  ? 'bg-blue-100 border-blue-400 text-blue-700'
                  : 'border-gray-200 text-gray-400 hover:border-gray-300'
              }\`}>
              {c} Kolom
            </button>
          ))}
        </div>
      </div>

      <div className={\`grid \${gridCols} gap-2\`}>
        {block.images.map((img, idx) => (
          <div
            key={idx}
            draggable
            onDragStart={() => handleDragStart(idx)}
            onDragOver={e => e.preventDefault()}
            onDrop={() => handleDrop(idx)}
            className="group relative cursor-grab active:cursor-grabbing"
          >
            <img src={img.url} alt={img.alt}
              className="w-full aspect-square object-cover rounded-lg" />
            <button
              onClick={() => handleRemove(idx)}
              className="absolute top-1 right-1 w-5 h-5 bg-black/60 text-white rounded-full text-xs opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"
            >×</button>
            <input
              value={img.caption || ''}
              onChange={e => handleCaptionChange(idx, e.target.value)}
              placeholder="Caption..."
              className="w-full mt-1 text-xs text-gray-400 text-center outline-none bg-transparent placeholder-gray-300"
            />
          </div>
        ))}

        {/* Add slot */}
        <UploadSlot onFile={handleAddImage} />
      </div>
    </div>
  )
}

function UploadSlot({ onFile }: { onFile: (f: File) => void }) {
  const ref = useRef<HTMLInputElement>(null)
  const [uploading, setUploading] = useState(false)

  const handle = async (file: File) => {
    setUploading(true)
    await onFile(file)
    setUploading(false)
  }

  return (
    <div
      onClick={() => ref.current?.click()}
      onDrop={e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if(f) handle(f) }}
      onDragOver={e => e.preventDefault()}
      className="aspect-square border-2 border-dashed border-gray-200 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-blue-300 hover:bg-blue-50/30 transition-colors"
    >
      {uploading
        ? <span className="text-xs text-gray-400">Uploading...</span>
        : <>
            <span className="text-xl text-gray-300">+</span>
            <span className="text-xs text-gray-300 mt-1">Tambah</span>
          </>
      }
      <input ref={ref} type="file" accept="image/*" className="hidden"
        onChange={e => { const f = e.target.files?.[0]; if(f) handle(f) }} />
    </div>
  )
}`

    code:`import { useState, useCallback } from 'react'
import { api } from '../lib/api'

export interface UploadResult {
  url: string
  thumbUrl: string
  width: number
  height: number
  size: number
}

interface UploadState {
  uploading: boolean
  progress: number
  error: string | null
  result: UploadResult | null
}

export function useImageUpload() {
  const [state, setState] = useState<UploadState>({
    uploading: false, progress: 0, error: null, result: null
  })

  const upload = useCallback(async (file: File): Promise<UploadResult | null> => {
    // Validate client-side
    const allowed = ['image/jpeg','image/png','image/webp','image/gif']
    if (!allowed.includes(file.type)) {
      setState(s => ({ ...s, error: 'Format file tidak didukung (JPG, PNG, WebP, GIF)' }))
      return null
    }
    if (file.size > 10 * 1024 * 1024) {
      setState(s => ({ ...s, error: 'Ukuran file melebihi 10MB' }))
      return null
    }

    setState({ uploading: true, progress: 5, error: null, result: null })

    const form = new FormData()
    form.append('file', file)

    try {
      const { data } = await api.post('/media/upload', form, {
        headers: { 'Content-Type': 'multipart/form-data' },
        onUploadProgress: e => {
          if (e.total) {
            setState(s => ({ ...s, progress: Math.round(e.loaded / e.total! * 90) }))
          }
        }
      })
      const result: UploadResult = data.data
      setState({ uploading: false, progress: 100, error: null, result })
      return result
    } catch (err: any) {
      const msg = err.response?.data?.error?.message || 'Upload gagal, coba lagi'
      setState({ uploading: false, progress: 0, error: msg, result: null })
      return null
    }
  }, [])

  const reset = useCallback(() => {
    setState({ uploading: false, progress: 0, error: null, result: null })
  }, [])

  return { ...state, upload, reset }
}`

import { useState, useEffect } from 'react'
import type { ImageItem } from '@beritakarya/types'

interface Props {

export function PublicGallery({ images }: Props) {
  const [active, setActive] = useState<number | null>(null)

  useEffect(() => {
    if (active === null) return
    const handler = (e: KeyboardEvent) => {
      if (e.key === 'ArrowRight') setActive(i => Math.min((i ?? 0) + 1, images.length - 1))
      if (e.key === 'ArrowLeft')  setActive(i => Math.max((i ?? 0) - 1, 0))
      if (e.key === 'Escape')     setActive(null)
    }
    window.addEventListener('keydown', handler)
    return () => window.removeEventListener('keydown', handler)
  }, [active, images.length])

  return (
    <>
      <figure className="my-6">
        <div className="grid grid-cols-3 gap-1.5">
          {images.map((img, i) => (
            <button key={i} onClick={() => setActive(i)} className="focus:outline-none">
              <img
                src={img.url} alt={img.alt}
                className="w-full aspect-square object-cover rounded-lg hover:opacity-90 transition-opacity cursor-pointer"
              />
            </button>
          ))}
        </div>
      </figure>

      {active !== null && (
        <div
          className="fixed inset-0 bg-black/92 z-50 flex flex-col items-center justify-center p-4"
          onClick={() => setActive(null)}
        >
          <img
            src={images[active]?.url} alt={images[active]?.alt}
            className="max-h-[80vh] max-w-[90vw] object-contain rounded-xl"
            onClick={e => e.stopPropagation()}
          />
          {images[active]?.caption && (
            <p className="text-white/70 text-sm mt-3">{images[active].caption}</p>
          )}

          <div className="flex items-center gap-8 mt-5">
            <button onClick={e => { e.stopPropagation(); setActive(i => Math.max((i ?? 0) - 1, 0)) }}
              disabled={active === 0}
              className="text-white text-3xl opacity-60 hover:opacity-100 disabled:opacity-20 transition-opacity"
            >‹</button>
            <span className="text-white/50 text-sm">{active + 1} / {images.length}</span>
            <button onClick={e => { e.stopPropagation(); setActive(i => Math.min((i ?? 0) + 1, images.length - 1)) }}
              disabled={active === images.length - 1}
              className="text-white text-3xl opacity-60 hover:opacity-100 disabled:opacity-20 transition-opacity"
            >›</button>
          </div>

          {/* Thumbnail strip */}
          <div className="flex gap-1.5 mt-4 overflow-x-auto max-w-sm">
            {images.map((img, i) => (
              <img key={i} src={img.url} alt={img.alt}
                onClick={e => { e.stopPropagation(); setActive(i) }}
                className={\`w-12 h-12 object-cover rounded cursor-pointer shrink-0 transition-all \${
                  i === active ? 'ring-2 ring-white opacity-100' : 'opacity-40 hover:opacity-70'
                }\`}
              />
            ))}
          </div>

          <button onClick={() => setActive(null)}
            className="absolute top-4 right-4 text-white/60 hover:text-white text-3xl transition-colors"
          >×</button>
        </div>
      )}
    </>
  )
}`

let current = 0;
const tagMap   = { be:'tag-be', fe:'tag-fe', ai:'tag-ai', test:'tag-test' };
const tagLabel = { be:'BE',     fe:'FE',     ai:'AI',     test:'Test'     };

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups  = {};
  files.forEach((f,i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx:i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      const tc = tagMap[f.tag]  || '';
      const tl = tagLabel[f.tag] || '';
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg style="width:13px;height:13px;flex-shrink:0;opacity:.4" viewBox="0 0 16 16" fill="currentColor">
          <path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/>
        </svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px">${f.name}</span>
        <span class="tag ${tc}">${tl}</span>
      </button>`;
    });
  }
  sidebar.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent       = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent     = String(idx + 1);
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent     = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length - 1, current + dir));
  selectFile(next);
  document.getElementById('fb' + next).scrollIntoView({ block: 'nearest' });
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();
selectFile(0);
</script>

    code:`import { prisma } from '../../db/client'
import type { Prisma } from '@prisma/client'

export async function findArticlesBySite(
  siteId: string,
  opts: { status?: string; search?: string; page?: number; limit?: number } = {}
) {
  const { status, search, page = 1, limit = 20 } = opts
  const where: Prisma.ArticleWhereInput = {
    siteId,
    ...(status && { status }),
    ...(search && { title: { contains: search, mode: 'insensitive' } })
  }
  const [items, total] = await Promise.all([
    prisma.article.findMany({
      where,
      select: {
        id: true, title: true, slug: true, status: true,
        siteId: true, authorId: true, publishedAt: true, createdAt: true,
        author: { select: { id: true, name: true } }
      },
      orderBy: { createdAt: 'desc' },
      skip: (page - 1) * limit,
      take: limit
    }),
    prisma.article.count({ where })
  ])
  return { items, total, page, limit, totalPages: Math.ceil(total / limit) }
}

export async function findArticleById(id: string, siteId: string) {
  return prisma.article.findFirst({
    where: { id, siteId },
    include: { author: { select: { id: true, name: true, email: true } } }
  })
}

export async function findArticleBySlug(slug: string, siteId: string) {
  return prisma.article.findUnique({
    where: { siteId_slug: { siteId, slug } },
    include: { author: { select: { id: true, name: true } } }
  })
}

export async function createArticle(data: {
  title: string; slug: string; siteId: string
  authorId: string; blocks?: any[]
}) {
  return prisma.article.create({ data: { ...data, blocks: data.blocks ?? [] } })
}

export async function updateArticle(
  id: string, siteId: string,
  data: Partial<{ title: string; blocks: any[]; metaTitle: string; metaDescription: string; status: string }>
) {
  return prisma.article.update({ where: { id }, data })
}

export async function deleteArticle(id: string) {
  return prisma.article.delete({ where: { id } })
}

export async function slugExists(slug: string, siteId: string, excludeId?: string) {
  const article = await prisma.article.findFirst({
    where: { slug, siteId, ...(excludeId && { id: { not: excludeId } }) }
  })
  return !!article
}`

    code:`import * as repo from './article.repository'
import { generateSlug } from '@beritakarya/utils'
import type { JWTPayload } from '@beritakarya/types'

export async function getArticles(
  siteId: string,
  query: { status?: string; search?: string; page?: number; limit?: number }
) {
  return repo.findArticlesBySite(siteId, query)
}

export async function getArticleById(id: string, siteId: string) {
  const article = await repo.findArticleById(id, siteId)
  if (!article) throw Object.assign(new Error('Artikel tidak ditemukan'), { statusCode: 404 })
  return article
}

export async function getArticleBySlug(slug: string, siteId: string) {
  const article = await repo.findArticleBySlug(slug, siteId)
  if (!article) throw Object.assign(new Error('Artikel tidak ditemukan'), { statusCode: 404 })
  return article
}

export async function createArticle(
  input: { title: string; blocks?: any[] },
  user: JWTPayload, siteId: string
) {
  let slug = generateSlug(input.title)
  let counter = 2
  while (await repo.slugExists(slug, siteId)) {
    slug = \`\${generateSlug(input.title)}-\${counter++}\`
  }
  return repo.createArticle({
    title: input.title,
    slug,
    siteId,
    authorId: user.userId,
    blocks: input.blocks ?? []
  })
}

export async function updateArticle(
  id: string, siteId: string,
  input: Partial<{ title: string; blocks: any[]; metaTitle: string; metaDescription: string }>,
  user: JWTPayload
) {
  const article = await repo.findArticleById(id, siteId)
  if (!article) throw Object.assign(new Error('Artikel tidak ditemukan'), { statusCode: 404 })
  if (user.role !== 'editor' && article.authorId !== user.userId) {
    throw Object.assign(new Error('Anda tidak punya akses ke artikel ini'), { statusCode: 403 })
  }
  let data: any = { ...input }
  if (input.title && input.title !== article.title) {
    let slug = generateSlug(input.title)
    let counter = 2
    while (await repo.slugExists(slug, siteId, id)) {
      slug = \`\${generateSlug(input.title)}-\${counter++}\`
    }
    data.slug = slug
  }
  return repo.updateArticle(id, siteId, data)
}

export async function publishArticle(id: string, siteId: string, user: JWTPayload) {
  const article = await repo.findArticleById(id, siteId)
  if (!article) throw Object.assign(new Error('Artikel tidak ditemukan'), { statusCode: 404 })
  if (user.role !== 'editor' && article.authorId !== user.userId) {
    throw Object.assign(new Error('Akses ditolak'), { statusCode: 403 })
  }
  return repo.updateArticle(id, siteId, {
    status: 'published',
    publishedAt: new Date() as any
  })
}

export async function deleteArticle(id: string, siteId: string, user: JWTPayload) {
  const article = await repo.findArticleById(id, siteId)
  if (!article) throw Object.assign(new Error('Artikel tidak ditemukan'), { statusCode: 404 })
  if (user.role !== 'editor' && article.authorId !== user.userId) {
    throw Object.assign(new Error('Akses ditolak'), { statusCode: 403 })
  }
  return repo.deleteArticle(id)
}`

const baseBlock = z.object({ id: z.string() })

export const blockSchema = z.discriminatedUnion('type', [
  baseBlock.extend({ type: z.literal('paragraph'), content: z.string() }),
  baseBlock.extend({ type: z.literal('heading'), level: z.union([z.literal(1),z.literal(2),z.literal(3),z.literal(4),z.literal(5),z.literal(6)]), content: z.string() }),

  baseBlock.extend({ type: z.literal('image'), url: z.string().url(), alt: z.string(), caption: z.string().optional(), width: z.number().optional(), height: z.number().optional() }),
  baseBlock.extend({

    columns: z.union([z.literal(2), z.literal(3)]),
    images: z.array(z.object({ url: z.string().url(), alt: z.string(), caption: z.string().optional() }))
  }),
  baseBlock.extend({
    type: z.literal('gallery'),
    images: z.array(z.object({ url: z.string().url(), alt: z.string(), caption: z.string().optional() }))
  }),
  baseBlock.extend({
    type: z.literal('embed'),
    url: z.string().url(),
    embedType: z.enum(['youtube','twitter','instagram','other']),
    title: z.string().optional()
  }),
])

export const createArticleSchema = z.object({
  title: z.string().min(5, 'Judul minimal 5 karakter').max(200),
  blocks: z.array(blockSchema).default([])
})

export const updateArticleSchema = z.object({

  search: z.string().optional(),
  page: z.coerce.number().positive().default(1),
  limit: z.coerce.number().positive().max(100).default(20)
})`

    step:'Langkah 2: Buat folder apps/api/src/modules/media/ lalu install multer: pnpm add multer sharp @types/multer',
    code:`import { Router, Request, Response } from 'express'
import multer from 'multer'
import path from 'path'
import fs from 'fs'
import { v4 as uuidv4 } from 'uuid'
import { requireAuth } from '../../middleware/auth.middleware'
import { asyncHandler } from '../../utils/asyncHandler'

export const mediaRouter = Router()

const UPLOAD_DIR = path.join(process.cwd(), 'uploads')
if (!fs.existsSync(UPLOAD_DIR)) fs.mkdirSync(UPLOAD_DIR, { recursive: true })

const storage = multer.diskStorage({
  destination: (_, __, cb) => cb(null, UPLOAD_DIR),
  filename: (_, file, cb) => {
    const ext = path.extname(file.originalname).toLowerCase()
    cb(null, \`\${uuidv4()}\${ext}\`)
  }
})

const upload = multer({
  storage,
  limits: { fileSize: 10 * 1024 * 1024 },
  fileFilter: (_, file, cb) => {
    const allowed = ['image/jpeg','image/png','image/webp','image/gif']
    if (allowed.includes(file.mimetype)) cb(null, true)
    else cb(new Error('Tipe file tidak didukung. Gunakan JPG, PNG, WebP, atau GIF'))
  }
})

mediaRouter.post(
  '/upload',
  requireAuth,
  upload.single('file'),
  asyncHandler(async (req: Request, res: Response) => {
    if (!req.file) {
      return res.status(400).json({
        success: false,
        error: { message: 'File tidak ditemukan' }
      })
    }

    let width: number | undefined
    let height: number | undefined

    try {
      const sharp = (await import('sharp')).default
      const meta = await sharp(req.file.path).metadata()
      width = meta.width
      height = meta.height
    } catch {}

    const url = \`\${process.env.API_URL}/uploads/\${req.file.filename}\`

    res.status(201).json({
      success: true,
      data: {
        url,
        filename: req.file.filename,
        originalName: req.file.originalname,
        size: req.file.size,
        mimeType: req.file.mimetype,
        width,
        height
      }
    })
  })
)

mediaRouter.use('/uploads', require('express').static(UPLOAD_DIR))`
  },

    step:'Langkah 4: Buat file ini di apps/web/store/ — ini adalah state utama seluruh editor',
    code:`import { create } from 'zustand'
import { v4 as uuidv4 } from 'uuid'
import { api } from '../lib/api'
import type { Block, ArticleStatus } from '@beritakarya/types'

interface EditorState {
  articleId: string | null
  title: string
  blocks: Block[]
  status: ArticleStatus
  saving: boolean
  lastSaved: Date | null
  isDirty: boolean
  undoStack: Block[][]

  setTitle: (title: string) => void
  setBlocks: (blocks: Block[]) => void
  addBlock: (type: Block['type'], afterId?: string) => void
  updateBlock: (id: string, data: Partial<Block>) => void
  removeBlock: (id: string) => void
  moveBlock: (id: string, direction: 'up' | 'down') => void
  reorderBlocks: (fromIdx: number, toIdx: number) => void
  undo: () => void
  loadArticle: (id: string, siteId: string) => Promise<void>
  saveArticle: () => Promise<void>
  publishArticle: () => Promise<void>
  reset: () => void
}

function defaultBlock(type: Block['type']): Block {
  const id = uuidv4()
  switch (type) {
    case 'paragraph': return { id, type, content: '' }
    case 'heading': return { id, type, level: 2, content: '' }
    case 'quote': return { id, type, content: '', attribution: '' }
    case 'image': return { id, type, url: '', alt: '', caption: '' }
    case 'imageGrid': return { id, type, columns: 2, images: [] }
    case 'gallery': return { id, type, images: [] }
    case 'embed': return { id, type, url: '', embedType: 'youtube' }
    default: return { id, type: 'paragraph', content: '' }
  }
}

let saveTimer: ReturnType<typeof setTimeout> | null = null

export const useEditorStore = create<EditorState>((set, get) => ({
  articleId: null,
  title: '',
  blocks: [{ id: uuidv4(), type: 'paragraph', content: '' }],
  status: 'draft',
  saving: false,
  lastSaved: null,
  isDirty: false,
  undoStack: [],

  setTitle: (title) => {
    set({ title, isDirty: true })
    scheduleAutoSave(get)
  },

  setBlocks: (blocks) => {
    set((s) => ({ undoStack: [...s.undoStack.slice(-20), s.blocks], blocks, isDirty: true }))
    scheduleAutoSave(get)
  },

  addBlock: (type, afterId) => {
    const newBlock = defaultBlock(type)
    set((s) => {
      const idx = afterId ? s.blocks.findIndex(b => b.id === afterId) : s.blocks.length - 1
      const next = [...s.blocks]
      next.splice(idx + 1, 0, newBlock)
      return { undoStack: [...s.undoStack.slice(-20), s.blocks], blocks: next, isDirty: true }
    })
    scheduleAutoSave(get)
  },

  updateBlock: (id, data) => {
    set((s) => ({
      blocks: s.blocks.map(b => b.id === id ? { ...b, ...data } as Block : b),
      isDirty: true
    }))
    scheduleAutoSave(get)
  },

  removeBlock: (id) => {
    set((s) => ({
      undoStack: [...s.undoStack.slice(-20), s.blocks],
      blocks: s.blocks.filter(b => b.id !== id),
      isDirty: true
    }))
  },

  moveBlock: (id, direction) => {
    set((s) => {
      const idx = s.blocks.findIndex(b => b.id === id)
      if (idx === -1) return s
      const next = [...s.blocks]
      const target = direction === 'up' ? idx - 1 : idx + 1
      if (target < 0 || target >= next.length) return s
      ;[next[idx], next[target]] = [next[target], next[idx]]
      return { undoStack: [...s.undoStack.slice(-20), s.blocks], blocks: next, isDirty: true }
    })
  },

  reorderBlocks: (fromIdx, toIdx) => {
    set((s) => {
      const next = [...s.blocks]
      const [moved] = next.splice(fromIdx, 1)
      next.splice(toIdx, 0, moved)
      return { undoStack: [...s.undoStack.slice(-20), s.blocks], blocks: next, isDirty: true }
    })
  },

  undo: () => {
    set((s) => {
      if (!s.undoStack.length) return s
      const prev = s.undoStack[s.undoStack.length - 1]
      return { blocks: prev, undoStack: s.undoStack.slice(0, -1), isDirty: true }
    })
  },

  loadArticle: async (id, siteId) => {
    const { data } = await api.get(\`/articles/\${id}?site=\${siteId}\`)
    const article = data.data
    set({
      articleId: article.id,
      title: article.title,
      blocks: article.blocks,
      status: article.status,
      isDirty: false,
      undoStack: []
    })
  },

  saveArticle: async () => {
    const { articleId, title, blocks } = get()
    if (!articleId) return
    set({ saving: true })
    try {
      await api.put(\`/articles/\${articleId}\`, { title, blocks })
      set({ saving: false, lastSaved: new Date(), isDirty: false })
    } catch {
      set({ saving: false })
    }
  },

  publishArticle: async () => {
    const { articleId } = get()
    if (!articleId) return
    await get().saveArticle()
    await api.post(\`/articles/\${articleId}/publish\`)
    set({ status: 'published' })
  },

  reset: () => set({
    articleId: null, title: '', status: 'draft',
    blocks: [{ id: uuidv4(), type: 'paragraph', content: '' }],
    saving: false, lastSaved: null, isDirty: false, undoStack: []
  })
}))

function scheduleAutoSave(get: () => EditorState) {
  if (saveTimer) clearTimeout(saveTimer)
  saveTimer = setTimeout(() => {
    if (get().isDirty && get().articleId) get().saveArticle()
  }, 3000)
}`

  const { updateBlock } = useEditorStore()
  const inputRef = useRef<HTMLInputElement>(null)
  const [uploading, setUploading] = useState(false)

  const handleUpload = async (file: File) => {
    const form = new FormData()
    form.append('file', file)
    setUploading(true)

    try {

        headers: { 'Content-Type': 'multipart/form-data' },
        onUploadProgress: (e) => {
          if (e.total) setProgress(Math.round((e.loaded / e.total) * 90))
        }
      })
      setProgress(100)
      updateBlock(block.id, {
        url: data.data.url,
        alt: file.name.replace(/\.[^/.]+$/, ''),
        width: data.data.width,
        height: data.data.height
      })
    } catch {
      alert('Upload gagal, coba lagi')
    } finally {
      setUploading(false)
      setProgress(0)
    }

import { useState } from 'react'
import { useEditorStore } from '../../../store/editorStore'
import type { EmbedBlock as TEmbedBlock } from '@beritakarya/types'

function detectEmbedType(url: string): TEmbedBlock['embedType'] {
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube'
  if (url.includes('twitter.com') || url.includes('x.com')) return 'twitter'
  if (url.includes('instagram.com')) return 'instagram'
  return 'other'
}

function getYouTubeId(url: string) {
  const match = url.match(/(?:v=|youtu\\.be\\/)([\\w-]{11})/)
  return match?.[1]
}

export function EmbedBlock({ block }: { block: TEmbedBlock }) {
  const { updateBlock } = useEditorStore()
  const [input, setInput] = useState(block.url)

  const handleConfirm = () => {
    const embedType = detectEmbedType(input)
    updateBlock(block.id, { url: input, embedType })
  }

  if (!block.url) {
    return (
      <div className="border rounded-xl p-4 bg-gray-50">
        <p className="text-xs text-gray-500 mb-2">Paste URL YouTube, Twitter, atau Instagram</p>
        <div className="flex gap-2">
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleConfirm()}
            placeholder="https://..."
            className="flex-1 text-sm border rounded-lg px-3 py-1.5 outline-none focus:border-blue-400"
          />
          <button
            onClick={handleConfirm}
            className="text-sm px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
          >Embed</button>
        </div>
      </div>
    )
  }

  if (block.embedType === 'youtube') {
    const videoId = getYouTubeId(block.url)
    if (videoId) {
      return (
        <div className="relative group">
          <div className="aspect-video rounded-xl overflow-hidden">
            <iframe
              src={\`https://www.youtube.com/embed/\${videoId}\`}
              className="w-full h-full"
              allowFullScreen
            />
          </div>
          <button
            onClick={() => updateBlock(block.id, { url: '', embedType: 'other' })}
            className="absolute top-2 right-2 bg-black/50 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100"
          >Ganti</button>
        </div>
      )
    }
  }

  return (
    <div className="border rounded-xl p-3 bg-gray-50 flex items-center gap-3">

    code:`import { notFound } from 'next/navigation'
import type { Block } from '@beritakarya/types'

interface Props {
  params: { site: string; slug: string }
}

async function getArticle(site: string, slug: string) {
  const res = await fetch(
    \`\${process.env.NEXT_PUBLIC_API_URL}/api/v1/articles/slug/\${slug}?site=\${site}\`,
    { next: { revalidate: 60 } }
  )
  if (!res.ok) return null
  const data = await res.json()
  return data.data
}

export default async function ArticlePage({ params }: Props) {
  const article = await getArticle(params.site, params.slug)
  if (!article || article.status !== 'published') notFound()

  return (
    <article className="max-w-3xl mx-auto px-4 py-12">
      <h1 className="text-4xl font-bold leading-tight mb-6">{article.title}</h1>
      <div className="flex items-center gap-3 text-sm text-gray-400 mb-10 pb-6 border-b">
        <span>{article.author?.name}</span>
        <span>·</span>
        <span>{new Date(article.publishedAt).toLocaleDateString('id-ID', {
          day:'numeric', month:'long', year:'numeric'
        })}</span>
      </div>
      <div className="space-y-5">
        {(article.blocks as Block[]).map(block => (
          <PublicBlock key={block.id} block={block} />
        ))}
      </div>
    </article>
  )
}

function PublicBlock({ block }: { block: Block }) {
  switch (block.type) {
    case 'paragraph':
      return <p className="text-lg leading-relaxed text-gray-800">{block.content}</p>
    case 'heading':
      const Tag = \`h\${block.level}\` as any
      const sizes: Record<number,string> = {1:'text-3xl',2:'text-2xl',3:'text-xl',4:'text-lg',5:'text-base',6:'text-sm'}
      return <Tag className={\`\${sizes[block.level]} font-bold mt-8 mb-2\`}>{block.content}</Tag>
    case 'quote':
      return (
        <blockquote className="border-l-4 border-blue-400 pl-5 py-2 my-6">
          <p className="text-xl italic text-gray-700">{block.content}</p>
          {block.attribution && <footer className="text-sm text-gray-400 mt-2">— {block.attribution}</footer>}
        </blockquote>
      )
    case 'image':
      return (
        <figure className="my-6">
          <img src={block.url} alt={block.alt} className="w-full rounded-xl" />
          {block.caption && <figcaption className="text-sm text-gray-400 text-center mt-2">{block.caption}</figcaption>}
        </figure>
      )
    case 'embed':
      if (block.embedType === 'youtube') {
        const id = block.url.match(/(?:v=|youtu\\.be\\/)([\\w-]{11})/)?.[1]
        if (id) return (
          <div className="aspect-video rounded-xl overflow-hidden my-6">
            <iframe src={\`https://www.youtube.com/embed/\${id}\`} className="w-full h-full" allowFullScreen />
          </div>
        )
      }
      return <a href={block.url} className="text-blue-500 underline" target="_blank">{block.url}</a>
    default:
      return null
  }
}

  if (!article) return {}
  return {
    title: article.metaTitle || article.title,
    description: article.metaDescription,
    openGraph: { title: article.title, type: 'article' }
  }

let current = 0;

const tagMap = { be:'tag-be', fe:'tag-fe', test:'tag-test' };
const tagLabel = { be:'BE', fe:'FE', test:'Test' };

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  files.forEach((f,i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx:i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      const tc = tagMap[f.tag] || '';
      const tl = tagLabel[f.tag] || '';
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg style="width:13px;height:13px;flex-shrink:0;opacity:.45" viewBox="0 0 16 16" fill="currentColor"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/></svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px">${f.name}</span>
        <span class="tag ${tc}">${tl}</span>
      </button>`;
    });
  }
  sidebar.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent = String(idx + 1);
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length-1, current+dir));
  selectFile(next);
  document.getElementById('fb'+next).scrollIntoView({block:'nearest'});
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();

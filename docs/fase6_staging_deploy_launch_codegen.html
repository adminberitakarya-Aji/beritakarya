FROM node:20-alpine AS deps
RUN cwd add --no-cache libc6-compat
WORKDIR /app

COPY package.json pnpm-workspace.yaml turbo.json ./
COPY apps/web/package.json ./apps/web/
COPY packages/types/package.json ./packages/types/
COPY packages/utils/package.json ./packages/utils/
COPY packages/config/package.json ./packages/config/

RUN npm install -g pnpm && pnpm install --frozen-lockfile

# Stage 2: Builder
FROM node:20-alpine AS builder
WORKDIR /app

COPY --from=deps /app/node_modules ./node_modules
COPY --from=deps /app/apps/web/node_modules ./apps/web/node_modules
COPY . .

ENV NEXT_TELEMETRY_DISABLED=1
ENV NODE_ENV=production

RUN npm install -g pnpm turbo
RUN pnpm turbo run build --filter=@beritakarya/web

# Stage 3: Runner
FROM node:20-alpine AS runner
WORKDIR /app

ENV NODE_ENV=production
ENV NEXT_TELEMETRY_DISABLED=1

RUN addgroup --system --gid 1001 nodejs
RUN adduser  --system --uid 1001 nextjs

COPY --from=builder /app/apps/web/public             ./public
COPY --from=builder --chown=nextjs:nodejs /app/apps/web/.next/standalone ./
COPY --from=builder --chown=nextjs:nodejs /app/apps/web/.next/static     ./.next/static

USER nextjs
EXPOSE 3000
ENV PORT=3000
ENV HOSTNAME="0.0.0.0"

HEALTHCHECK --interval=30s --timeout=10s --start-period=30s --retries=3 \
  CMD wget -qO- http://localhost:3000/api/health || exit 1

  // ── NGINX ─────────────────────────────────────────────────
  {
    group:'NGINX', tag:'nginx',
    name:'nginx.prod.conf',
    path:'infra/nginx/nginx.prod.conf',
    desc:'NGINX production config: wildcard subdomain routing, SSL termination, proxy ke web dan api, gzip compression',
    step:'Langkah 2: Buat folder infra/nginx/ lalu buat file ini. SSL cert digenerate di langkah setup server.',
    code:`user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # Gzip
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types      text/plain text/css application/json
                  application/javascript text/xml
                  application/xml image/svg+xml;

  # Rate limiting zones
  limit_req_zone  $binary_remote_addr zone=api:10m   rate=100r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;

  # ── Redirect HTTP → HTTPS ──────────────────────────────────
  server {
    listen 80;
    server_name *.beritakarya.com beritakarya.com;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name *.beritakarya.com;

    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 15M;

    # ── API routes ─────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api:4000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Site-ID         $subdomain;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # ── Auth rate limit ────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:4000;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static uploads ─────────────────────────────────────
    location /uploads/ {
      proxy_pass       http://api:4000;
      proxy_cache_valid 200 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Frontend ───────────────────────────────────────────
    location / {
      proxy_pass         http://web:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 30s;
    }

    # Extract subdomain for X-Site-ID header
    set $subdomain "";
    if ($host ~* "^([^.]+)\\.beritakarya\\.com$") {
      set $subdomain $1;
    }
  }
}`
  },

}`

    step:'Langkah 4: Buat file ini di .github/workflows/ — tambahkan secrets di GitHub repo settings',
    code:`name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/\${{ github.repository }}/web
  IMAGE_API: ghcr.io/\${{ github.repository }}/api

jobs:
  # ── 1. Test ───────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: beritakarya

    env:

      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-min-32-chars-here
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 8 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: cd apps/api && pnpm db:generate && pnpm prisma migrate deploy
      - run: pnpm turbo run test
      - run: pnpm turbo run lint type-check

  # ── 2. Build & Push ───────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      web-tag: \${{ steps.meta-web.outputs.tags }}
      api-tag: \${{ steps.meta-api.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: \${{ env.REGISTRY }}
          username: \${{ github.actor }}
          password: \${{ secrets.GITHUB_TOKEN }}

      - name: Meta web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: \${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Meta api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: \${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: \${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: \${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy Staging (auto) ──────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy ke staging
        uses: appleboy/ssh-action@v1
        with:
          host:     \${{ secrets.STAGING_HOST }}
          username: \${{ secrets.STAGING_USER }}
          key:      \${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/beritakarya

            docker compose -f infra/docker/docker-compose.prod.yml pull
            docker compose -f infra/docker/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "✅ Staging deployed at $(date)"

  deploy-production:

    environment: production

            # Backup database sebelum deploy
            docker exec beritakarya_postgres pg_dump -U \$POSTGRES_USER \$POSTGRES_DB > /backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql
            docker compose -f infra/docker/docker-compose.prod.yml pull
            docker compose -f infra/docker/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "🚀 Production deployed at $(date)"`

    code:`#!/bin/bash
set -e

DOMAIN="beritakarya.com"
EMAIL="admin@beritakarya.com"
SSL_DIR="/etc/ssl/beritakarya"

echo "🔐 Setting up SSL untuk *.$DOMAIN..."

# Install certbot
if ! command -v certbot &> /dev/null; then
  apt-get install -y certbot python3-certbot-dns-cloudflare
fi

# Buat direktori SSL
mkdir -p "$SSL_DIR"

# ── PILIHAN 1: Cloudflare DNS (otomatis wildcard) ──────────
# Buat file credentials Cloudflare
cat > /root/.cloudflare.ini << EOF
dns_cloudflare_api_token = CLOUDFLARE_API_TOKEN_ANDA
EOF
chmod 600 /root/.cloudflare.ini

certbot certonly \
  --dns-cloudflare \
  --dns-cloudflare-credentials /root/.cloudflare.ini \
  --dns-cloudflare-propagation-seconds 60 \
  -d "$DOMAIN" \
  -d "*.$DOMAIN" \
  --email "$EMAIL" \
  --agree-tos \
  --non-interactive

# Copy cert ke lokasi NGINX
cp /etc/letsencrypt/live/$DOMAIN/fullchain.pem "$SSL_DIR/fullchain.pem"
cp /etc/letsencrypt/live/$DOMAIN/privkey.pem   "$SSL_DIR/privkey.pem"
chmod 644 "$SSL_DIR/fullchain.pem"
chmod 600 "$SSL_DIR/privkey.pem"

# ── Auto-renewal ───────────────────────────────────────────
cat > /etc/cron.d/certbot-renewal << EOF
0 3 * * * root certbot renew --quiet --post-hook "cp /etc/letsencrypt/live/$DOMAIN/fullchain.pem $SSL_DIR/fullchain.pem && cp /etc/letsencrypt/live/$DOMAIN/privkey.pem $SSL_DIR/privkey.pem && docker restart beritakarya_nginx"
EOF

echo "✅ SSL wildcard berhasil digenerate!"
echo "📍 Cert location: $SSL_DIR"
echo "🔄 Auto-renewal dikonfigurasi (daily check pukul 03:00)"

# ── PILIHAN 2: Manual DNS (jika bukan Cloudflare) ─────────
echo ""
echo "Jika bukan Cloudflare, gunakan perintah ini secara manual:"
echo "certbot certonly --manual --preferred-challenges dns -d '$DOMAIN' -d '*.$DOMAIN'"`

ENVIRONMENT="${1:-staging}"

  echo "❌ ERROR: $ENV_FILE tidak ditemukan!"
  echo "   Copy .env.production.example ke .env.production dan isi nilainya."

  exit 1

echo "💾 Backing up database..."
source "$ENV_FILE"

  docker exec beritakarya_postgres \

docker compose -f "$COMPOSE_FILE" pull

# ── Rolling update ─────────────────────────────────────────
echo "♻️  Updating services..."
docker compose -f "$COMPOSE_FILE" up -d --remove-orphans

# ── Wait for health ────────────────────────────────────────
echo "⏳ Waiting for services to be healthy..."
sleep 10

API_STATUS=$(curl -sf http://localhost:4000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
WEB_STATUS=$(curl -sf http://localhost:3000/api/health 2>/dev/null && echo "ok" || echo "unreachable")

echo "   API health: $API_STATUS"
echo "   Web health: $WEB_STATUS"

if [ "$API_STATUS" != "ok" ]; then
  echo "⚠️  WARNING: API tidak healthy. Cek: docker logs beritakarya_api"
fi

# ── Cleanup ────────────────────────────────────────────────
docker image prune -f

echo ""
echo "✅ Deploy selesai! [$ENVIRONMENT] - $TIMESTAMP"

import bcrypt from 'bcryptjs'

const prisma = new PrismaClient({
  datasources: { db: { url: process.env.DATABASE_URL } }
})

const SITES = [
  { id: 'bandung',  name: 'Beritakarya Bandung',  domain: 'bandung.staging.beritakarya.com' },
  { id: 'surabaya', name: 'Beritakarya Surabaya', domain: 'surabaya.staging.beritakarya.com' }
]

const hash = async (pw: string) => bcrypt.hash(pw, 10)

const sampleBlocks = (site: string) => [
  { id: '1', type: 'paragraph', content: \`Ini adalah paragraf pembuka artikel dari \${site}. Lorem ipsum dolor sit amet, consectetur adipiscing elit.\` },
  { id: '2', type: 'heading', level: 2, content: 'Latar Belakang' },
  { id: '3', type: 'paragraph', content: 'Paragraf kedua berisi detail lebih lanjut tentang topik yang dibahas dalam artikel ini.' },
  { id: '4', type: 'quote', content: 'Ini adalah kutipan dari narasumber yang relevan dengan artikel.', attribution: 'Narasumber, Jabatan' },
  { id: '5', type: 'paragraph', content: 'Paragraf penutup yang merangkum seluruh isi artikel dengan kesimpulan yang jelas.' }
]

async function main() {
  console.log('🌱 Seeding staging data...')

  // Sites
  for (const site of SITES) {
    await prisma.site.upsert({ where: { id: site.id }, update: site, create: site })
    console.log(\`  ✅ Site: \${site.name}\`)
  }

  // Users
  const users = [
    { email: 'jurnalis@bandung.com',      name: 'Andi Jurnalis',    role: 'journalist', siteId: 'bandung',  pw: 'password123' },
    { email: 'editor@bandung.com',         name: 'Budi Editor',      role: 'editor',     siteId: 'bandung',  pw: 'password123' },
    { email: 'jurnalis@surabaya.com',      name: 'Cici Jurnalis',    role: 'journalist', siteId: 'surabaya', pw: 'password123' },
    { email: 'editor@surabaya.com',        name: 'Dedi Editor',      role: 'editor',     siteId: 'surabaya', pw: 'password123' },
    { email: 'editor.pusat@beritakarya.com', name: 'Editor Pusat',   role: 'editor',     siteId: null,       pw: 'password123' },
  ]

  for (const u of users) {
    const { pw, ...data } = u
    await prisma.user.upsert({
      where: { email: data.email },
      update: {},
      create: { ...data, passwordHash: await hash(pw) }
    })
    console.log(\`  ✅ User: \${data.email} [\${data.role}]\`)
  }

  // Articles
  const journalistBandung  = await prisma.user.findUnique({ where: { email: 'jurnalis@bandung.com' } })
  const journalistSurabaya = await prisma.user.findUnique({ where: { email: 'jurnalis@surabaya.com' } })

  const articleTemplates = [
    { title: 'Pembangunan Infrastruktur Kota Terus Dipercepat', status: 'published' },
    { title: 'Festival Budaya Tahunan Resmi Dibuka Hari Ini',   status: 'published' },
    { title: 'Pemkot Luncurkan Program Beasiswa Untuk Pelajar', status: 'published' },
    { title: 'Pasar Tradisional Akan Direnovasi Tahun Ini',     status: 'published' },
    { title: 'Tim Lokal Raih Juara di Kompetisi Nasional',      status: 'published' },
    { title: 'Rencana Pembangunan Taman Kota Baru Diumumkan',   status: 'draft' },
    { title: 'Inisiatif Lingkungan Hijau Mendapat Dukungan',    status: 'draft' },
    { title: 'Laporan Ekonomi Daerah Kuartal Pertama',          status: 'review' },
    { title: 'Program Kesehatan Masyarakat Diperluas',          status: 'draft' },
    { title: 'Inovasi Digital Sektor UMKM Lokal',               status: 'review' },
  ]

  for (const site of ['bandung', 'surabaya']) {
    const author = site === 'bandung' ? journalistBandung : journalistSurabaya
    if (!author) continue
    for (const tmpl of articleTemplates) {
      const slug = tmpl.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
      await prisma.article.upsert({
        where: { siteId_slug: { siteId: site, slug } },
        update: {},
        create: {
          title: tmpl.title, slug, siteId: site,
          authorId: author.id, blocks: sampleBlocks(site),
          status: tmpl.status,
          publishedAt: tmpl.status === 'published' ? new Date() : null
        }
      })
    }
    console.log(\`  ✅ 10 artikel seeded untuk site: \${site}\`)
  }

  console.log('')
  console.log('🎉 Staging seed selesai!')
  console.log('   Login: jurnalis@bandung.com / password123')
  console.log('   Login: editor.pusat@beritakarya.com / password123')
}

main().catch(console.error).finally(() => prisma.$disconnect())`

let current = 0;
const tagMap   = { docker:'tag-docker', nginx:'tag-nginx', ci:'tag-ci', script:'tag-script', env:'tag-env', doc:'tag-doc' };
const tagLabel = { docker:'Docker',     nginx:'NGINX',     ci:'CI',     script:'Script',     env:'ENV',     doc:'Doc'     };

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const groups = {};
  files.forEach((f,i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx:i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      const tc = tagMap[f.tag]   || '';
      const tl = tagLabel[f.tag] || '';
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg style="width:13px;height:13px;flex-shrink:0;opacity:.4" viewBox="0 0 16 16" fill="currentColor">
          <path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/>
        </svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px">${f.name}</span>
        <span class="tag ${tc}">${tl}</span>
      </button>`;
    });
  }
  sb.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent       = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent     = String(idx + 1);
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent     = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length - 1, current + dir));
  selectFile(next);
  document.getElementById('fb' + next).scrollIntoView({ block: 'nearest' });
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();
selectFile(0);
</script>

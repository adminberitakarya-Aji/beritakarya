    step:'Langkah 3: Buat folder packages/utils/src/ lalu buat file ini',
    code:`export function generateSlug(title: string): string {
  return title
    .toLowerCase()
    .trim()
    .replace(/[àáâãäå]/g, 'a')
    .replace(/[èéêë]/g, 'e')
    .replace(/[ìíîï]/g, 'i')
    .replace(/[òóôõö]/g, 'o')
    .replace(/[ùúûü]/g, 'u')
    .replace(/[^a-z0-9\\s-]/g, '')
    .replace(/\\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
}

export function makeUniqueSlug(
  base: string,
  existingSlugs: string[]
): string {
  const slug = generateSlug(base)
  if (!existingSlugs.includes(slug)) return slug
  let counter = 2
  while (existingSlugs.includes(\`\${slug}-\${counter}\`)) {
    counter++
  }
  return \`\${slug}-\${counter}\`
}`

  date: Date | string,
  locale = 'id-ID'
): string {
  const d = typeof date === 'string' ? new Date(date) : date
  return d.toLocaleDateString(locale, {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  })
}

export function formatRelativeTime(date: Date | string): string {
  const d = typeof date === 'string' ? new Date(date) : date
  const diff = Date.now() - d.getTime()
  const minutes = Math.floor(diff / 60000)
  const hours = Math.floor(diff / 3600000)
  const days = Math.floor(diff / 86400000)
  if (minutes < 1) return 'Baru saja'
  if (minutes < 60) return \`\${minutes} menit lalu\`
  if (hours < 24) return \`\${hours} jam lalu\`
  if (days < 7) return \`\${days} hari lalu\`
  return formatDate(d)
}

export function truncate(text: string, maxLength: number): string {
  if (text.length <= maxLength) return text
  return text.slice(0, maxLength).trim() + '...'
}

export function wordCount(text: string): number {
  return text.trim().split(/\\s+/).filter(Boolean).length

let current = 0;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  files.forEach((f, i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx: i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg class="file-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/></svg>
        ${f.name}
      </button>`;
    });
  }
  sidebar.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent = idx + 1;
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length-1, current + dir));
  selectFile(next);
  document.getElementById('fb'+next).scrollIntoView({block:'nearest'});
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();
selectFile(0);

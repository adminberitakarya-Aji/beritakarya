import jwt from 'jsonwebtoken'
import { prisma } from '../../db/client'
import { redis } from '../../lib/redis'
import type { JWTPayload } from '@beritakarya/types'

const ACCESS_SECRET = process.env.JWT_SECRET!
const ACCESS_EXPIRES = process.env.JWT_ACCESS_EXPIRES || '15m'
const REFRESH_EXPIRES_DAYS = 7

export async function loginUser(email: string, password: string) {
  const user = await prisma.user.findUnique({ where: { email } })
  if (!user) throw new Error('Email atau password salah')

  const valid = await bcrypt.compare(password, user.passwordHash)
  if (!valid) throw new Error('Email atau password salah')

  return generateTokenPair(user)
}

export async function registerUser(
  email: string, password: string, name: string,
  role: string, siteId: string | null
) {
  const exists = await prisma.user.findUnique({ where: { email } })
  if (exists) throw new Error('Email sudah terdaftar')

  const passwordHash = await bcrypt.hash(password, 10)
  const user = await prisma.user.create({
    data: { email, passwordHash, name, role, siteId }
  })
  return generateTokenPair(user)
}

export async function refreshAccessToken(refreshToken: string) {
  const record = await prisma.refreshToken.findUnique({
    where: { token: refreshToken },
    include: { user: true }
  })
  if (!record || record.expiresAt < new Date()) {
    throw new Error('Refresh token tidak valid atau sudah expired')
  }
  return generateTokenPair(record.user)
}

export async function logoutUser(userId: string, refreshToken: string) {
  await prisma.refreshToken.deleteMany({
    where: { userId, token: refreshToken }
  })
}

async function generateTokenPair(user: any) {
  const payload: Omit<JWTPayload, 'iat' | 'exp'> = {
    userId: user.id,
    role: user.role,
    siteId: user.siteId
  }
  const accessToken = jwt.sign(payload, ACCESS_SECRET, {
    expiresIn: ACCESS_EXPIRES
  })

  const expiresAt = new Date()
  expiresAt.setDate(expiresAt.getDate() + REFRESH_EXPIRES_DAYS)

  const { v4: uuidv4 } = await import('uuid')
  const refreshToken = uuidv4()
  await prisma.refreshToken.create({
    data: { token: refreshToken, userId: user.id, expiresAt }
  })

  return {
    accessToken,
    refreshToken,
    user: {
      id: user.id,
      email: user.email,
      name: user.name,
      role: user.role,
      siteId: user.siteId
    }
  }
}`

    code:`import { Request, Response, NextFunction } from 'express'
import jwt from 'jsonwebtoken'
import type { JWTPayload } from '@beritakarya/types'

declare global {
  namespace Express {
    interface Request {
      user?: JWTPayload
      site?: string
    }
  }
}

export function requireAuth(
  req: Request,
  res: Response,
  next: NextFunction
) {
  const authHeader = req.headers.authorization
  if (!authHeader?.startsWith('Bearer ')) {
    return res.status(401).json({
      success: false,
      error: { code: 'UNAUTHORIZED', message: 'Token tidak ditemukan' }
    })
  }

  const token = authHeader.slice(7)
  try {
    const payload = jwt.verify(
      token,
      process.env.JWT_SECRET!
    ) as JWTPayload
    req.user = payload
    next()
  } catch {
    return res.status(401).json({
      success: false,
      error: { code: 'TOKEN_INVALID', message: 'Token tidak valid atau sudah expired' }
    })
  }
}

export function requireRole(...roles: string[]) {
  return (req: Request, res: Response, next: NextFunction) => {
    if (!req.user) {
      return res.status(401).json({
        success: false,
        error: { code: 'UNAUTHORIZED', message: 'Belum login' }
      })
    }
    if (!roles.includes(req.user.role)) {
      return res.status(403).json({
        success: false,
        error: { code: 'FORBIDDEN', message: 'Akses ditolak' }
      })
    }
    next()
  }
}`

    code:`import { Request, Response, NextFunction } from 'express'
import { KNOWN_SITE_IDS } from '@beritakarya/config'

export function siteMiddleware(
  req: Request,
  res: Response,
  next: NextFunction
) {
  const siteId =
    (req.query.site as string) ||
    (req.headers['x-site-id'] as string)

  if (!siteId) {
    return res.status(400).json({
      success: false,
      error: { code: 'SITE_REQUIRED', message: 'Parameter site diperlukan' }
    })
  }

  if (!KNOWN_SITE_IDS.includes(siteId)) {
    return res.status(400).json({
      success: false,
      error: { code: 'SITE_UNKNOWN', message: \`Site "\${siteId}" tidak dikenal\` }
    })
  }

  req.site = siteId
  next()
}

export function requireSiteAccess(
  req: Request,
  res: Response,
  next: NextFunction
) {
  if (!req.user) return next()

  if (
    req.user.role === 'journalist' &&
    req.user.siteId !== req.site
  ) {
    return res.status(403).json({
      success: false,
      error: {
        code: 'SITE_FORBIDDEN',
        message: 'Anda hanya bisa mengakses site Anda sendiri'
      }
    })
  }
  next()
}`

    code:`import { Request, Response, NextFunction } from 'express'
import { ZodError } from 'zod'
import { logger } from '../lib/logger'

export function errorMiddleware(
  err: any,
  req: Request,
  res: Response,
  next: NextFunction
) {
  logger.error({
    message: err.message,
    stack: err.stack,
    path: req.path,
    method: req.method,
    requestId: req.headers['x-request-id'],
    userId: req.user?.userId,
    site: req.site,
  })

  if (err instanceof ZodError) {
    return res.status(400).json({
      success: false,
      error: {
        code: 'VALIDATION_ERROR',
        message: 'Input tidak valid',
        details: err.errors.map(e => ({
          field: e.path.join('.'),
          message: e.message
        }))
      }
    })
  }

  if (err.message?.includes('salah') ||
      err.message?.includes('terdaftar') ||
      err.message?.includes('tidak valid')) {
    return res.status(400).json({
      success: false,
      error: { code: 'BAD_REQUEST', message: err.message }
    })
  }

  const statusCode = err.statusCode || 500
  const message = process.env.NODE_ENV === 'production'
    ? 'Terjadi kesalahan server'
    : err.message

  res.status(statusCode).json({
    success: false,
    error: { code: 'SERVER_ERROR', message }
  })
}`

    code:`import { Router, Request, Response } from 'express'

    step:'Langkah 8: Buat file ini di apps/web/ (sejajar dengan app/ folder)',
    code:`import { NextResponse } from 'next/server'
import type { NextRequest } from 'next/server'
import { KNOWN_SITE_IDS } from '@beritakarya/config'

export function middleware(req: NextRequest) {
  const hostname = req.headers.get('host') || ''
  const subdomain = hostname.split('.')[0]

  const isLocalhost = hostname.includes('localhost')
  const siteId = isLocalhost
    ? req.nextUrl.searchParams.get('site') || subdomain
    : subdomain

  if (!KNOWN_SITE_IDS.includes(siteId) && !hostname.includes('www')) {
    return NextResponse.rewrite(new URL('/404', req.url))
  }

  const res = NextResponse.next()
  res.cookies.set('siteId', siteId, {
    httpOnly: false,
    sameSite: 'lax',
    maxAge: 60 * 60 * 24
  })
  res.headers.set('x-site-id', siteId)
  return res
}

export const config = {
  matcher: ['/((?!_next/static|_next/image|favicon.ico|api).*)']
}`

    step:'Langkah 8: Buat folder apps/web/lib/ lalu buat file ini',
    code:`import axios from 'axios'

const API_URL = process.env.NEXT_PUBLIC_API_URL || 'http://localhost:4000'

export const api = axios.create({
  baseURL: \`\${API_URL}/api/v1\`,
  headers: { 'Content-Type': 'application/json' }
})

api.interceptors.request.use((config) => {
  if (typeof window !== 'undefined') {
    const token = localStorage.getItem('accessToken')
    if (token) config.headers.Authorization = \`Bearer \${token}\`

    const siteId = document.cookie
      .split('; ')
      .find(r => r.startsWith('siteId='))
      ?.split('=')[1]
    if (siteId) {
      config.headers['X-Site-ID'] = siteId
      if (!config.params) config.params = {}
      config.params.site = siteId
    }
  }
  return config
})

api.interceptors.response.use(
  (res) => res,
  async (error) => {
    const original = error.config
    if (error.response?.status === 401 && !original._retry) {
      original._retry = true
      const refreshToken = localStorage.getItem('refreshToken')
      if (refreshToken) {
        try {
          const { data } = await axios.post(
            \`\${API_URL}/api/v1/auth/refresh\`,
            { refreshToken }
          )
          localStorage.setItem('accessToken', data.data.accessToken)
          original.headers.Authorization = \`Bearer \${data.data.accessToken}\`
          return api(original)
        } catch {
          localStorage.removeItem('accessToken')
          localStorage.removeItem('refreshToken')
          window.location.href = '/login'
        }
      }
    }
    return Promise.reject(error)
  }
)`

    code:`import { create } from 'zustand'
import { api } from '../lib/api'
import type { AuthUser } from '@beritakarya/types'

interface AuthState {
  user: AuthUser | null
  isLoading: boolean
  error: string | null
  login: (email: string, password: string) => Promise<void>
  logout: () => Promise<void>
  clearError: () => void
}

export const useAuthStore = create<AuthState>((set, get) => ({
  user: null,
  isLoading: false,
  error: null,

  login: async (email, password) => {
    set({ isLoading: true, error: null })
    try {
      const { data } = await api.post('/auth/login', { email, password })
      const { accessToken, refreshToken, user } = data.data
      localStorage.setItem('accessToken', accessToken)
      localStorage.setItem('refreshToken', refreshToken)
      set({ user, isLoading: false })
    } catch (err: any) {
      const msg = err.response?.data?.error?.message || 'Login gagal'
      set({ error: msg, isLoading: false })
      throw new Error(msg)
    }
  },

  logout: async () => {
    const refreshToken = localStorage.getItem('refreshToken')
    const userId = get().user?.id
    if (userId && refreshToken) {
      await api.post('/auth/logout', { userId, refreshToken }).catch(() => {})
    }
    localStorage.removeItem('accessToken')
    localStorage.removeItem('refreshToken')
    set({ user: null })
  },

  clearError: () => set({ error: null })
}))`

let current = 0;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  files.forEach((f,i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx:i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      const warn = f.name.includes('schema') || f.name.includes('middleware') || f.name.includes('main')
        ? '<span class="warn-tag">penting</span>' : '';
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg style="width:14px;height:14px;flex-shrink:0;opacity:.5" viewBox="0 0 16 16" fill="currentColor"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/></svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span>${warn}
      </button>`;
    });
  }
  sidebar.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent = idx + 1;
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length-1, current+dir));
  selectFile(next);
  document.getElementById('fb'+next).scrollIntoView({block:'nearest'});
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();
selectFile(0);

import { logger } from '../lib/logger'

export interface AIResult<T> {
  success: boolean
  data?: T
  error?: string
}

export async function callAI<T>(
  fn: () => Promise<T>,
  maxRetries = 3
): Promise<AIResult<T>> {
  let lastError: Error | null = null

  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const data = await fn()
      return { success: true, data }
    } catch (err: any) {
      lastError = err
      const isRetryable =
        err?.status === 429 ||
        err?.status >= 500 ||
        err?.code === 'ETIMEDOUT' ||
        err?.code === 'ECONNRESET'

      if (!isRetryable || attempt === maxRetries) break

      const delay = Math.pow(2, attempt - 1) * 1000
      logger.warn(\`AI retry attempt \${attempt}/\${maxRetries} in \${delay}ms — \${err.message}\`)
      await new Promise(r => setTimeout(r, delay))
    }
  }

  logger.error({ message: 'AI call failed', error: lastError?.message })
  return {
    success: false,
    error: 'AI tidak tersedia saat ini. Coba lagi nanti.'
  }
}

    code:`import { callAI, chatComplete } from './base.service'
import type { AIResult } from './base.service'
import type { Block } from '@beritakarya/types'

export interface LayoutSuggestion {
  type: 'split_paragraph' | 'insert_image_after' | 'add_heading' | 'reorder'
  targetBlockId: string
  reason: string
  data?: Record<string, any>

export interface LayoutResult {
  suggestions: LayoutSuggestion[]
  summary: string

function summarizeBlocks(blocks: Block[]): string {
  return blocks.map((b, i) => {
    if (b.type === 'paragraph') return \`[\${i}] paragraph: \${(b as any).content?.slice(0, 80)}...\`
    if (b.type === 'heading') return \`[\${i}] heading H\${(b as any).level}: \${(b as any).content}\`
    if (b.type === 'image') return \`[\${i}] image\`
    return \`[\${i}] \${b.type}\`
  }).join('\n')
}

    code:`import { Router, Request, Response } from 'express'
import { z } from 'zod'
import { requireAuth } from '../middleware/auth.middleware'
import { aiLimiter } from '../lib/rateLimit'
import { asyncHandler } from '../utils/asyncHandler'

export const aiRouter = Router()
aiRouter.use(requireAuth, aiLimiter)

async function withUsageLog(
  req: Request,
  action: string,
  input: string,
  fn: () => Promise<any>
) {
  const start = Date.now()
  const result = await fn()
  await logUsage({
    userId: req.user!.userId,
    siteId: req.user!.siteId ?? 'pusat',
    action,
    inputLength: input.length,
    outputLength: JSON.stringify(result.data ?? '').length,
    latencyMs: Date.now() - start,
    success: result.success
  })
  return result
}

aiRouter.post('/rewrite', asyncHandler(async (req: Request, res: Response) => {

    writeService.rewriteBlock(content, tone, length, {
      prev: prevContent, next: nextContent

  )
  res.json(result)
}))

    code:`import { useState, useCallback } from 'react'
import { api } from '../lib/api'

interface AIState<T> {
  loading: boolean
  result: T | null
  error: string | null
}

function useAIAction<TInput, TResult>(
  endpoint: string
): [AIState<TResult>, (input: TInput) => Promise<TResult | null>] {
  const [state, setState] = useState<AIState<TResult>>({
    loading: false, result: null, error: null
  })

  const call = useCallback(async (input: TInput): Promise<TResult | null> => {
    setState({ loading: true, result: null, error: null })
    try {
      const { data } = await api.post(\`/ai/\${endpoint}\`, input)
      if (!data.success) throw new Error(data.error || 'AI gagal')
      setState({ loading: false, result: data.data, error: null })
      return data.data
    } catch (err: any) {
      const msg = err.response?.data?.error || err.message || 'AI tidak tersedia'
      setState({ loading: false, result: null, error: msg })
      return null
    }
  }, [endpoint])

  return [state, call]
}

    code:`'use client'
import { useEffect, useCallback } from 'react'
import { useEditorStore } from '../../store/editorStore'
import { BlockList } from './BlockList'
import { EditorToolbar } from './EditorToolbar'
import { AddBlockMenu } from './AddBlockMenu'
import { AISidebar } from './AISidebar'  // ← TAMBAHKAN INI

interface EditorProps {
  articleId: string
  siteId: string
}

export function Editor({ articleId, siteId }: EditorProps) {
  const { loadArticle, saveArticle, undo, saving, lastSaved, isDirty } = useEditorStore()

  useEffect(() => {
    loadArticle(articleId, siteId)
  }, [articleId, siteId])

  const handleKeyDown = useCallback((e: KeyboardEvent) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault()
      undo()
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault()
      saveArticle()
    }
  }, [undo, saveArticle])

  useEffect(() => {
    window.addEventListener('keydown', handleKeyDown)
    return () => window.removeEventListener('keydown', handleKeyDown)
  }, [handleKeyDown])

  return (
    <>
      <div className="max-w-3xl mx-auto px-4 py-8">
        <EditorToolbar />

        <div className="mt-2 mb-1 flex items-center gap-3 text-xs text-gray-400">
          {saving && <span>Menyimpan...</span>}
          {!saving && lastSaved && (
            <span>Tersimpan {lastSaved.toLocaleTimeString('id-ID')}</span>
          )}
          {!saving && isDirty && !lastSaved && <span>Belum tersimpan</span>}
        </div>

        <TitleInput />

        <div className="mt-6">
          <BlockList />
        </div>

        <div className="mt-4">
          <AddBlockMenu afterId={undefined} />
        </div>
      </div>

      {/* AI Sidebar — floating, tidak blocking editor */}
      <AISidebar />   {/* ← TAMBAHKAN INI */}
    </>
  )
}

      rows={2}
      className="w-full text-3xl font-bold border-none outline-none resize-none bg-transparent placeholder-gray-300 leading-tight"
    />
  )
}`

let current = 0;

const tagMap = { be:'tag-be', fe:'tag-fe', ai:'tag-ai', test:'tag-test' };
const tagLabel = { be:'BE', fe:'FE', ai:'AI', test:'Test' };

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  files.forEach((f,i) => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push({...f, idx:i});
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="group-label">${g}</div>`;
    items.forEach(f => {
      const tc = tagMap[f.tag]||'';
      const tl = tagLabel[f.tag]||'';
      html += `<button class="file-btn${f.idx===0?' active':''}" id="fb${f.idx}" onclick="selectFile(${f.idx})">
        <svg style="width:13px;height:13px;flex-shrink:0;opacity:.4" viewBox="0 0 16 16" fill="currentColor"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6L9 1zm0 1.5L12.5 6H9V2.5z"/></svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px">${f.name}</span>
        <span class="tag ${tc}">${tl}</span>
      </button>`;
    });
  }
  sidebar.innerHTML = html;
}

function selectFile(idx) {
  current = idx;
  const f = files[idx];
  document.getElementById('fp').textContent = f.path;
  document.getElementById('code-pre').textContent = f.code;
  document.getElementById('desc-bar').textContent = f.desc;
  document.getElementById('snum').textContent = String(idx+1);
  document.getElementById('step-txt').textContent = f.step;
  document.getElementById('prog').textContent = `${idx+1} / ${files.length} file`;
  document.querySelectorAll('.file-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function navFile(dir) {
  const next = Math.max(0, Math.min(files.length-1, current+dir));
  selectFile(next);
  document.getElementById('fb'+next).scrollIntoView({block:'nearest'});
}

function copyCode() {
  navigator.clipboard.writeText(files[current].code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Tersalin!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildSidebar();
selectFile(0);
</script>
